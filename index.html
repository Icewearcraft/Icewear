<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>IcewearCraft VIP</title>

  <link rel="icon" href="icon.png">
  <link rel="apple-touch-icon" href="icon.png">
  <link rel="manifest" href="site.webmanifest">
  <link rel="stylesheet" href="style.css?v=4000">
</head>

<body>

  <div id="splash">
    <img src="icon.png" alt="IcewearCraft">
  </div>

  <section id="auth" class="auth-screen">
    <div class="auth-card">
      <img src="icon.png" class="auth-logo" alt="IcewearCraft">

      <p class="eyebrow">ICEWEARCRAFT VIP</p>
      <h1>Enter The Glacier</h1>
      <p class="auth-copy">
        Curated drops, exclusive commercials, apparel releases, and VIP-only access.
      </p>

      <input id="email" type="email" placeholder="Email Address" autocomplete="email">
      <input id="password" type="password" placeholder="Password" autocomplete="current-password">

     <button id="loginBtn" onclick="login()">Login</button>
<button id="signupBtn" class="secondary" onclick="signUp()">Create Account</button>

      <p class="small-note">21+ Only • VIP Access Required</p>
    </div>
  </section>

  <main id="app" style="display:none;">

    <header class="app-header">
      <div>
        <h2>❄️ IcewearCraft</h2>
        <p id="memberStatus">Founder Access</p>
      </div>

      <button onclick="logout()" class="logout-btn">Logout</button>
    </header>

    <section id="content"></section>

   <nav class="nav">
  <button id="homeBtn" onclick="showTab('home')">Home</button>
  <button id="walletBtn" onclick="showTab('wallet')">Wallet</button>
  <button id="commercialsBtn" onclick="showTab('commercials')">Videos</button>
  <button id="dropsBtn" onclick="showTab('drops')">Apparel</button>
  <button id="checkoutBtn" onclick="showTab('checkout')">
    Checkout
  </button>
     <button id="ordersBtn" onclick="showTab('orders')">My Orders</button>
<button id="policiesBtn" onclick="showTab('policies')">Policies</button>
  <button id="vipBtn" onclick="showTab('vip')">VIP</button>
  <button id="adminBtn" onclick="showTab('admin')" style="display:none;">Admin</button>
</nav>
  </main>
<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
<script type="module" src="script.js?v=19000"></script>

</body>
</html>
